ignore:
  # - vulnerability: CVE-2025-3277 #  sqlite-libs 3.48.0-r2
  # - vulnerability: CVE-2024-9410 # ada-libs 2.9.2-r1
  - vulnerability: GHSA-2g4f-4pwh-qvx6 # ajv 8.17.1 - unfixable transitive dependency

# Set output format defaults
output:
  - "table"
  - "json"

# Modify your CircleCI job to check critical count
search:
  scope: "squashed"
quiet: false
check-for-app-update: false
scan-type: source
