scan-type: source

ignore:
  # - vulnerability: CVE-2025-3277 #  sqlite-libs 3.48.0-r2 
  # - vulnerability: CVE-2024-9410 # ada-libs 2.9.2-r1

  - vulnerability: GHSA-xxjr-mmjv-4gpg
    include-aliases: true
    reason: "lodash/lodash-es 4.17.21 transitive via ts-auto-mock in @mojaloop/api-snippets and @mojaloop/central-services-shared — no upgrade path available"
  - vulnerability: GHSA-848j-6mx2-7j84
    include-aliases: true
    reason: "elliptic transitive via fido2-lib@2.8.3 — pinned version, no upgrade path available"

# Set output format defaults
output:
  - "table"
  - "json"

# Modify your CircleCI job to check critical count
search:
  scope: "squashed"
quiet: false
check-for-app-update: false
